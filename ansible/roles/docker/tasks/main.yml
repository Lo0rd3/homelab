---
- name: Validate Docker role inputs
  ansible.builtin.assert:
    that:
      - ansible_facts["distribution"] == 'Debian'
      - ansible_facts["distribution_major_version"] == '12'
      - docker_prerequisite_packages is sequence
      - docker_prerequisite_packages is not string
      - docker_conflicting_packages is sequence
      - docker_conflicting_packages is not string
      - docker_packages is sequence
      - docker_packages is not string
      - docker_service_names is sequence
      - docker_service_names is not string
      - docker_users is sequence
      - docker_users is not string
      - docker_apt_keyring_dir is string
      - docker_apt_keyring_path is string
      - docker_apt_keyring_url is string
      - docker_apt_repo_url is string
      - docker_apt_repo_component is string
      - docker_apt_release is string
      - docker_apt_arch is string
    fail_msg: Docker role expects Debian 12 and the documented list/string variable types.

- name: Ensure Docker prerequisite packages are present
  ansible.builtin.apt:
    name: "{{ docker_prerequisite_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name: "{{ docker_conflicting_packages }}"
    state: absent
    purge: true
  when: docker_conflicting_packages | length > 0

- name: Ensure Docker APT keyring directory exists
  ansible.builtin.file:
    path: "{{ docker_apt_keyring_dir }}"
    state: directory
    mode: '0755'

- name: Install Docker APT signing key
  ansible.builtin.get_url:
    url: "{{ docker_apt_keyring_url }}"
    dest: "{{ docker_apt_keyring_path }}"
    mode: '0644'

- name: Configure Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }} signed-by={{ docker_apt_keyring_path }}]
      {{ docker_apt_repo_url }} {{ docker_apt_release }} {{ docker_apt_repo_component }}
    filename: docker
    state: present

- name: Ensure Docker packages are present
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure Docker services are enabled and running
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ docker_service_names }}"

- name: Ensure optional Docker users are in the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  when: docker_users | length > 0
