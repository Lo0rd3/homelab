---
- name: Apply baseline role to Debian hosts
  hosts: debian
  become: true
  roles:
    - role: baseline

- name: Apply Docker role to Docker hosts
  hosts: docker_hosts
  become: true
  roles:
    - role: docker

- name: Bootstrap Python on Alpine hosts
  hosts: alpine
  become: true
  gather_facts: false
  tasks:
    - name: Ensure Python 3 is present for Ansible modules
      ansible.builtin.raw: command -v python3 >/dev/null 2>&1 || apk add --no-cache python3
      changed_when: false

- name: Apply monitoring role to monitoring hosts
  hosts: monitoring
  become: true
  roles:
    - role: monitoring

- name: Apply Proxmox host TUN setup for tailscale LXC hosts
  hosts: proxmox_hosts
  become: true
  roles:
    - role: proxmox_lxc_tunnel_access

- name: Apply Tailscale role to tailscale router hosts
  hosts: tailscale
  become: true
  roles:
    - role: tailscale

- name: Apply node_exporter role to standalone monitored hosts
  hosts: node_exporter_hosts
  become: true
  roles:
    - role: node_exporter

- name: Apply AdGuard role to adguard hosts
  hosts: adguard
  become: true
  roles:
    - role: adguard
