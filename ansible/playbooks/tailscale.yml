---
- name: Apply Proxmox host TUN setup for tailscale-01
  hosts: proxmox_hosts
  become: true
  roles:
    - role: proxmox_lxc_tunnel_access

- name: Configure Tailscale router hosts
  hosts: tailscale
  become: true
  roles:
    - role: tailscale

- name: Configure node_exporter on standalone monitored hosts
  hosts: node_exporter_hosts
  become: true
  roles:
    - role: node_exporter
