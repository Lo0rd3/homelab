---
# Shared non-secret defaults for monitoring stack hosts.
monitoring_stack_enabled: true
monitoring_stack_name: monitoring
monitoring_compose_project_name: monitoring
monitoring_compose_file_name: compose.yml
monitoring_compose_env_file_name: monitoring.env

monitoring_prometheus_enabled: true
monitoring_prometheus_image: prom/prometheus
monitoring_prometheus_image_tag: v3.3.0

monitoring_grafana_enabled: true
monitoring_grafana_image: grafana/grafana
monitoring_grafana_image_tag: 11.6.0

monitoring_alertmanager_enabled: true
monitoring_alertmanager_image: prom/alertmanager
monitoring_alertmanager_image_tag: v0.28.1

monitoring_node_exporter_enabled: true
monitoring_node_exporter_image: prom/node-exporter
monitoring_node_exporter_image_tag: v1.9.0

monitoring_cadvisor_enabled: true
monitoring_cadvisor_image: gcr.io/cadvisor/cadvisor
monitoring_cadvisor_image_tag: v0.49.1
